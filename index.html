<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機電整合丙級 物料流動模擬動畫</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --line-color: #334155;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .header {
            margin-bottom: 20px;
            text-align: center;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: background-color 0.2s, transform 0.1s;
            user-select: none; /* 防止長按時選取到文字 */
            -webkit-user-select: none;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        /* 廠房與畫布設定 */
        #factory {
            position: relative;
            width: 900px;
            height: 500px;
            background-color: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--line-color);
            overflow: hidden;
        }

        /* 傳送帶 SVG 背景線 */
        #conveyors {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .path-line {
            fill: none;
            stroke: #475569;
            stroke-width: 12;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .path-line-inner {
            fill: none;
            stroke: #cbd5e1;
            stroke-width: 2;
            stroke-dasharray: 6, 6;
            animation: dash 1s linear infinite;
        }

        @keyframes dash {
            to { stroke-dashoffset: -12; }
        }

        /* 站點樣式 */
        .station {
            position: absolute;
            width: 100px;
            height: 60px;
            background-color: #1e293b;
            border: 2px solid #0ea5e9;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            color: #bae6fd;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: inset 0 0 10px rgba(14, 165, 233, 0.2);
        }

        .station span {
            font-size: 10px;
            color: #7dd3fc;
            margin-top: 4px;
        }

        /* 出料口(收納盒)樣式 */
        .bin {
            position: absolute;
            width: 90px;
            height: 60px;
            border: 2px dashed #64748b;
            background-color: rgba(30, 41, 59, 0.8);
            border-radius: 8px;
            transform: translate(-40%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #94a3b8;
            z-index: 5;
        }

        /* 移動的物料樣式 */
        .material {
            position: absolute;
            width: 32px;
            height: 32px;
            z-index: 20;
            /* 使用 CSS Transition 達成平滑移動 */
            transition: left 1s linear, top 1s linear, opacity 0.5s ease;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* 形狀與材質類別 */
        .shape-round { border-radius: 50%; }
        .shape-square { border-radius: 6px; }

        .mat-red { background: linear-gradient(135deg, #ef4444, #991b1b); border: 2px solid #fca5a5; }
        .mat-black { background: linear-gradient(135deg, #334155, #0f172a); border: 2px solid #64748b; }
        .mat-plastic { background: linear-gradient(135deg, #10b981, #047857); border: 2px solid #6ee7b7; }
        .mat-aluminum { background: linear-gradient(135deg, #3b82f6, #1d4ed8); border: 2px solid #93c5fd; }

        /* 物料處理時的發光特效 */
        .processing {
            animation: pulse 0.5s alternate infinite;
        }
        @keyframes pulse {
            to { box-shadow: 0 0 15px 5px rgba(255, 255, 255, 0.6); transform: translate(-50%, -50%) scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>機電整合丙級 - 各站物料處理與移動模擬</h2>
        <!-- 移除了原本的 onclick，改由下方程式碼綁定滑鼠與觸控事件 -->
        <button id="spawnBtn">產生隨機物料</button>
    </div>

    <div id="factory">
        <!-- SVG 傳送帶路徑線 (底層) -->
        <svg id="conveyors">
            <!-- 供料區 -> S1 -->
            <path class="path-line" d="M 0 250 L 100 250" />
            <path class="path-line-inner" d="M 0 250 L 100 250" />
            
            <!-- S1 -> S2 (圓料線) -->
            <path class="path-line" d="M 100 250 L 100 120 L 300 120" />
            <path class="path-line-inner" d="M 100 250 L 100 120 L 300 120" />
            
            <!-- S1 -> S3 (方料線) -->
            <path class="path-line" d="M 100 250 L 100 380 L 300 380" />
            <path class="path-line-inner" d="M 100 250 L 100 380 L 300 380" />
            
            <!-- S2 -> S5 -->
            <path class="path-line" d="M 300 120 L 600 120 L 650 250" />
            <path class="path-line-inner" d="M 300 120 L 600 120 L 650 250" />
            
            <!-- S3 -> S4 -->
            <path class="path-line" d="M 300 380 L 500 380" />
            <path class="path-line-inner" d="M 300 380 L 500 380" />
            
            <!-- S4 -> S5 -->
            <path class="path-line" d="M 500 380 L 600 380 L 650 250" />
            <path class="path-line-inner" d="M 500 380 L 600 380 L 650 250" />

            <!-- S5 -> 出料口 P0 (圓料) -->
            <path class="path-line" d="M 650 250 L 700 120 L 820 120" />
            <path class="path-line-inner" d="M 650 250 L 700 120 L 820 120" />

            <!-- S5 -> 出料口 P1 (塑膠) -->
            <path class="path-line" d="M 700 250 L 820 250" />
            <path class="path-line-inner" d="M 700 250 L 820 250" />

            <!-- S5 -> 出料口 P2 (鋁製) -->
            <path class="path-line" d="M 650 250 L 700 380 L 820 380" />
            <path class="path-line-inner" d="M 650 250 L 700 380 L 820 380" />
        </svg>

        <!-- 站點 UI (中層) -->
        <div class="station" style="left: 100px; top: 250px;">S1 站<span>形狀判別</span></div>
        <div class="station" style="left: 300px; top: 120px;">S2 站<span>圓料翻轉</span></div>
        <div class="station" style="left: 300px; top: 380px;">S3 站<span>方料轉正</span></div>
        <div class="station" style="left: 500px; top: 380px;">S4 站<span>方料加工</span></div>
        <div class="station" style="left: 650px; top: 250px;">S5 站<span>秤重與分裝</span></div>

        <!-- 出料口 (收納盒) -->
        <div class="bin" style="left: 820px; top: 120px; border-color: #fca5a5;">P0<br>(圓料)</div>
        <div class="bin" style="left: 820px; top: 250px; border-color: #6ee7b7;">P1<br>(塑膠方料)</div>
        <div class="bin" style="left: 820px; top: 380px; border-color: #93c5fd;">P2<br>(鋁製方料)</div>
    </div>

    <!-- 動畫邏輯腳本 -->
    <script>
        const factory = document.getElementById('factory');

        // 輔助函式：等待 N 毫秒
        const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // 核心物流序列引擎
        async function runMaterialSequence(matData) {
            // 1. 產生 DOM 元素
            const el = document.createElement('div');
            el.className = `material shape-${matData.shape} mat-${matData.type}`;
            
            // 初始座標 (畫面左側外)
            el.style.left = '-30px';
            el.style.top = '250px';
            factory.appendChild(el);

            // 輔助函式：移動元素
            const moveTo = async (x, y, duration = 1000) => {
                el.style.transitionDuration = `${duration}ms`;
                el.style.left = `${x}px`;
                el.style.top = `${y}px`;
                await wait(duration);
            };

            // 輔助函式：模擬加工暫停
            const processAtStation = async (text, duration = 800) => {
                el.innerText = text;
                el.classList.add('processing'); // 加上發光動畫
                await wait(duration);
                el.classList.remove('processing');
                el.innerText = '';
            };

            // ==== 開始流程 ====
            await wait(50); // 確保 DOM 已渲染

            // 進入 S1 站
            await moveTo(100, 250, 1000);
            await processAtStation('判別', 800);

            if (matData.shape === 'round') {
                // === 圓料路徑 (往上) ===
                await moveTo(100, 120, 600); // 往上偏移
                await moveTo(300, 120, 1000); // 到達 S2
                await processAtStation('翻轉', 800);

                // 從 S2 直接前往 S5
                await moveTo(600, 120, 2000); // 直達 S5 的正上方路口
                await moveTo(650, 250, 600); // 往下進入 S5

            } else {
                // === 方料路徑 (往下) ===
                await moveTo(100, 380, 600); // 往下偏移
                await moveTo(300, 380, 1000); // 到達 S3
                await processAtStation('轉正', 800);

                // 從 S3 前往 S4
                await moveTo(500, 380, 1000); // 到達 S4
                await processAtStation('加工', 1200);

                // 從 S4 前往 S5
                await moveTo(600, 380, 1000); // 直達 S5 的正下方路口
                await moveTo(650, 250, 600); // 往上進入 S5
            }

            // 進入 S5 站 (秤重分裝)
            await processAtStation('秤重', 900);

            // ==== 分裝至出料口 ====
            if (matData.shape === 'round') {
                // P0
                await moveTo(700, 120, 600); //往右上斜走
                await moveTo(820, 120, 600);
            } else if (matData.type === 'plastic') {
                // P1
                await moveTo(820, 250, 600);
            } else if (matData.type === 'aluminum') {
                // P2
                await moveTo(700, 380, 600); //往右下斜走
                await moveTo(820, 380, 600);
            }

            // 到達終點，淡出並移除 DOM
            el.innerText = 'OK';
            await wait(500);
            el.style.opacity = 0;
            await wait(500);
            el.remove();
        }

        // 隨機產生一種物料並推入產線
        function spawnRandomMaterial() {
            const types = [
                { shape: 'round', type: 'red' },      // 紅色圓料
                { shape: 'round', type: 'black' },    // 黑色圓料
                { shape: 'square', type: 'plastic' }, // 塑膠方料
                { shape: 'square', type: 'aluminum' } // 鋁製方料
            ];
            
            // 隨機抽選一種
            const randomMat = types[Math.floor(Math.random() * types.length)];
            
            // 執行序列
            runMaterialSequence(randomMat);
        }

        // ==========================================
        // 長按連續產生功能設定區
        // ==========================================
        const spawnBtn = document.getElementById('spawnBtn');
        let spawnInterval = null;

        function startSpawning(e) {
            // 若為觸控事件，阻止預設行為以避免同時觸發滑鼠事件 (防止重複)
            if (e && e.type === 'touchstart') {
                e.preventDefault();
            }

            // 按下的第一瞬間先產生一個物料
            spawnRandomMaterial();

            // 若尚未設定定時器，則啟動每 1000 毫秒 (1秒) 產生一個的循環
            if (!spawnInterval) {
                spawnInterval = setInterval(spawnRandomMaterial, 500);
            }
        }

        function stopSpawning() {
            // 停止並清除定時器
            if (spawnInterval) {
                clearInterval(spawnInterval);
                spawnInterval = null;
            }
        }

        // 綁定滑鼠事件 (電腦端)
        spawnBtn.addEventListener('mousedown', startSpawning);
        spawnBtn.addEventListener('mouseup', stopSpawning);
        spawnBtn.addEventListener('mouseleave', stopSpawning); // 避免按住拖到按鈕外放開會繼續產生的 Bug

        // 綁定觸控事件 (手機/平板端)
        spawnBtn.addEventListener('touchstart', startSpawning, { passive: false });
        spawnBtn.addEventListener('touchend', stopSpawning);
        spawnBtn.addEventListener('touchcancel', stopSpawning);
        
    </script>
</body>
</html>
